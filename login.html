<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Login - Doce História</title>

    <!-- FONTES -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@500;700&display=swap"
        rel="stylesheet">

    <!-- ÍCONES -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- CSS -->

    <link rel="stylesheet"
        href="login.css">

</head>

<body>

    <main class="container">

        <!-- LADO DIREITO -->

        <div class="right">

            <div class="form-box">

                <h2>Login</h2>

                <p class="subtitle">
                    Entre na sua conta para continuar
                </p>

                <form>

                    <!-- EMAIL -->

                    <div class="input-group">

                        <label for="email">
                            E-mail
                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-envelope"></i>

                            <input
                                type="email"
                                id="email"
                                placeholder="Digite seu e-mail"
                                required>

                        </div>

                    </div>

                    <!-- SENHA -->

                    <div class="input-group">

                        <label for="senha">
                            Senha
                        </label>

                        <div class="input-box">

                            <i class="fa-solid fa-lock"></i>

                            <input
                                type="password"
                                id="senha"
                                placeholder="Digite sua senha"
                                required>

                        </div>

                    </div>

                    <!-- CHECKBOX -->

                    <div class="checkbox">

                        <input type="checkbox"
                            id="lembrar">

                        <label for="lembrar">
                            Lembrar meus dados
                        </label>

                    </div>

                    <!-- BOTÃO -->

                    <button class="btn"
                        type="submit">

                        Entrar

                    </button>

                </form>

                <!-- LINK -->

                <div class="login-link">

                    <p>
                        Ainda não possui conta?
                        <a href="cadastro.html">
                            Cadastre-se
                        </a>
                    </p>

                </div>

                <!-- REDES -->

                <div class="social">

            <a href="https://www.instagram.com/docehistoriacp/" target="_blank">
                <i class="fa-brands fa-instagram"></i>
            </a>

            <a href="http://wa.me/message/LAPDJ3KH7F42D1" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
            </a>

            <a href="mailto:docehistoriavendas@gmail.com">
                <i class="fa-solid fa-envelope"></i>
            </a>

        </div>

        </div>

        </div>

    </div>

</body>

</html>
